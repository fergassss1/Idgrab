<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID Grabber</title>
    
    <style>
        /* SF Pro Variable Font */
        @font-face {
            font-family: "SF Pro";
            src: url("https://raw.githubusercontent.com/sahibjotsaggu/San-Francisco-Pro-Fonts/master/SF-Pro.ttf") format("truetype");
            font-display: swap;
        }

        /* SF Mono Standard Font (Static / Non-Variable) */
        @font-face {
            font-family: "SF Mono";
            src: url("https://raw.githubusercontent.com/supercomputra/SF-Mono-Font/master/SFMono-Regular.otf") format("opentype");
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }
        
        #copy-icon {
            filter: brightness(0) invert(1);
            transition: transform 0.2s ease;
        }

        @keyframes copyToRed {
            0% {
                filter: brightness(0) invert(1); /* White */
                transform: scale(1);
            }
            30% {
                filter: invert(27%) sepia(85%) saturate(5421%) hue-rotate(350deg) brightness(98%) contrast(105%);
                transform: scale(1.2);
            }
            80% {
                filter: invert(27%) sepia(85%) saturate(5421%) hue-rotate(350deg) brightness(98%) contrast(105%);
                transform: scale(1);
            }
            100% {
                filter: brightness(0) invert(1);
                transform: scale(1);
            }
        }

        .copy-animated {
            animation: copyToRed 1.8s ease-in-out forwards;
        }

        :root {
            --bg-color: #1e1e1e;
            --card-bg: #2b2b2d;
            --border-color: #444446;
            --text-main: #f5f5f7;
            --text-muted: #8e8e93;
            --apple-red: #fa243c; /* Apple Music Red */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "SF Pro", -apple-system, BlinkMacSystemFont, sans-serif;
            font-variation-settings: "opsz" 18, "wght" 400;
            font-weight: 400;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        /* Header Title Section */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-family: "SF Pro", -apple-system, sans-serif;
            font-size: 42px;
            font-weight: 590;
            font-variation-settings: "opsz" 28, "wght" 590;
            letter-spacing: -0.5px;
            color: #ffffff;
            margin-bottom: 6px;
        }

        .header p {
            font-family: "SF Pro", -apple-system, sans-serif;
            font-size: 15px;
            font-weight: 400;
            font-variation-settings: "opsz" 18, "wght" 400;
            color: var(--text-muted);
        }

        /* Main Outer Container */
        .main-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 28px;
            padding: 32px;
            width: 100%;
            max-width: 850px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        /* Search Inputs Row */
        .search-row {
            display: flex;
            gap: 16px;
            margin-bottom: 32px;
        }

        .input-wrapper {
            position: relative;
            flex: 1;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            width: 20px;
            height: 20px;
            opacity: 0.8;
            filter: invert(1);
            transition: filter 0.2s, transform 0.2s;
        }

        #song-input-icon {
            cursor: pointer;
            pointer-events: auto;
        }

        #song-input-icon:hover {
            transform: scale(1.15);
        }

        #song-input-icon:active {
            transform: scale(0.95);
        }

        .search-input {
            width: 100%;
            height: 52px;
            background-color: transparent;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 0 16px 0 48px;
            font-family: "SF Pro", -apple-system, sans-serif;
            font-size: 18px;
            font-weight: 400;
            font-variation-settings: "opsz" 18, "wght" 400;
            color: var(--text-main);
            outline: none;
            transition: border-color 0.2s, color 0.2s;
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        /* Red Highlight on Hover & Focus/Click */
        .search-input:hover, 
        .search-input:focus {
            border-color: var(--apple-red);
            color: var(--apple-red);
        }

        .input-wrapper:hover .input-icon,
        .input-wrapper:focus-within .input-icon {
            filter: invert(27%) sepia(91%) saturate(5412%) hue-rotate(345deg) brightness(98%) contrast(98%);
        }

        /* Storefront Selection Bar */
        .storefront-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 24px;
            font-size: 13px;
            color: var(--text-muted);
            font-variation-settings: "opsz" 18, "wght" 400;
        }

        .storefront-select {
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            border-radius: 8px;
            padding: 6px 12px;
            font-size: 13px;
            outline: none;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .storefront-select:hover {
            border-color: var(--apple-red);
        }

        /* Results Display Section */
        .result-container {
            display: none;
            align-items: center;
            gap: 20px;
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .artwork-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
            border-radius: 20px;
            overflow: hidden;
            flex-shrink: 0;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
            background: linear-gradient(135deg, var(--apple-red) 0%, #800000 100%);
        }

        .artwork {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .artwork-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
            z-index: 2;
        }

        .song-details {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .song-title {
            font-family: "SF Pro", -apple-system, sans-serif;
            font-size: 28px;
            font-weight: 590;
            font-variation-settings: "opsz" 28, "wght" 590;
            color: #ffffff;
            line-height: 1.2;
            transition: color 0.2s;
            display: flex;
            align-items: center;
        }

        .song-title:hover {
            color: var(--apple-red);
        }

        .song-artist {
            font-family: "SF Pro", -apple-system, sans-serif;
            font-size: 16px;
            font-weight: 400;
            font-variation-settings: "opsz" 18, "wght" 400;
            color: var(--text-muted);
            margin-bottom: 12px;
            transition: color 0.2s;
        }

        .song-artist:hover {
            color: var(--apple-red);
        }

        /* ID Pill Badge */
        .id-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background-color: transparent;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 6px 14px;
            cursor: pointer;
            width: fit-content;
            transition: border-color 0.2s, background-color 0.2s;
        }

        .id-pill-text {
            font-family: "SF Mono", monospace;
            font-weight: 400;
            font-style: normal;
            font-size: 14px;
            color: var(--text-main);
            transition: color 0.2s;
        }

        .id-pill:hover,
        .id-pill:active {
            border-color: var(--apple-red);
            background-color: rgba(250, 36, 60, 0.08);
        }

        .id-pill:hover .id-pill-text,
        .id-pill:active .id-pill-text {

        }

        .id-pill img {
            width: 14px;
            height: 14px;
            filter: invert(1);
            transition: filter 0.2s;
        }

        .id-pill:hover img {
            filter: invert(27%) sepia(91%) saturate(5412%) hue-rotate(345deg) brightness(98%) contrast(98%);

        .reload-btn {

            color: var(--text-muted);

            font-size: 12px;
            font-weight: 400;

            text-decoration: underline;
            color: var(--apple-red);
        }

        .error-message {
            color: #ff453a;
            font-size: 14px;
            display: none;
            margin-top: 10px;
        }
    </style>

<script>
    class MusicCatalogAPI {
        async getCatalogInfo(query, storefront = "us", mode = "song", offset = 0) {
            const rawTitle = (query.title || '').trim();
            const rawArtist = (query.artistName || '').trim();

            if (!rawTitle && !rawArtist) return null;

            // Step 1: Combined search
            let result = await this._executeSearch(`${rawTitle} ${rawArtist}`, storefront, mode, offset);

            // Step 2: Fallback without parenthetical details
            if (!result && rawTitle.includes("(")) {
                const strippedTitle = rawTitle.replace(/\([^\)]*\)/g, "").trim();
                result = await this._executeSearch(`${strippedTitle} ${rawArtist}`, storefront, mode, offset);
            }

            // Step 3: Title fallback
            if (!result && rawTitle) {
                result = await this._executeSearch(rawTitle, storefront, mode, offset);
            }

            return result;
        }

        async _executeSearch(searchTerm, storefront, mode, offset) {
            if (!searchTerm.trim()) return null;

            const entity = mode === "album" ? "album" : "song";

            const params = new URLSearchParams({
                term: searchTerm.trim(),
                country: storefront || 'us',
                media: 'music',
                entity: entity,
                limit: '25'
            });

            const targetUrl = `https://itunes.apple.com/search?${params.toString()}`;

            try {
                const response = await fetch(targetUrl);
                if (!response.ok) return null;

                const data = await response.json();
                const results = data.results || [];

                if (results.length === 0 || offset >= results.length) return null;

                const item = results[offset];

                // Upscale static artwork resolution to crisp 1000x1000
                const rawCover = item.artworkUrl100 || "";
                const artworkUrl = rawCover ? rawCover.replace("100x100bb", "1000x1000bb") : "";

                const title = item.trackName || item.collectionName || "Unknown Title";
                const id = String(item.trackId || item.collectionId || "");
                const isExplicit = (item.trackExplicitness === "explicit" || item.collectionExplicitness === "explicit");

                return {
                    title: title,
                    artistName: item.artistName,
                    collectionName: item.collectionName,
                    albumCoverLink: artworkUrl,
                    appleID: id,
                    isExplicit: isExplicit,
                    motionM3u8: item.motionM3u8 || null,
                    motionMp4: item.motionMp4 || null
                };
            } catch (e) {
                console.error("iTunes Search API Error:", e);
                return null;
            }
        }
    }

    const catalogService = new MusicCatalogAPI();
    let debounceTimer = null;
    let currentCatalogId = "";
    let currentMode = "song"; // "song" or "album"

    // Click icon handler to toggle modes seamlessly
    function toggleSearchMode() {
        currentMode = (currentMode === "song") ? "album" : "song";

        const songInput = document.getElementById('song-input');
        const searchIcon = document.getElementById('song-input-icon');

        if (currentMode === "album") {
            songInput.placeholder = "Album";
            if (searchIcon) searchIcon.src = "ics/album.svg";
        } else {
            songInput.placeholder = "Song";
            if (searchIcon) searchIcon.src = "ics/note.svg";
        }

        handleSearch();
    }

    function handleSearch() {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(performSearch, 400);
    }

    function showError(msg) {
        const errorBox = document.getElementById('error-box');
        if (msg) {
            errorBox.innerText = msg;
            errorBox.style.display = 'block';
            document.getElementById('result-card').style.display = 'none';
        } else {
            errorBox.style.display = 'none';
        }
    }

    // Parse master .m3u8 playlist to pick the highest quality stream URL via CORS proxy
    async function resolveBestM3u8Variant(masterUrl) {
        try {
            const corsProxy = "https://corsproxy.io/?";
            const response = await fetch(corsProxy + encodeURIComponent(masterUrl));
            if (!response.ok) return masterUrl;

            const text = await response.text();
            const lines = text.split('\n');
            
            let maxBandwidth = 0;
            let bestVariantUrl = null;

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();

                if (line.startsWith('#EXT-X-STREAM-INF:') && !line.includes('trickplay')) {
                    const bandwidthMatch = line.match(/BANDWIDTH=(\d+)/);
                    const bandwidth = bandwidthMatch ? parseInt(bandwidthMatch[1], 10) : 0;
                    const nextLine = lines[i + 1] ? lines[i + 1].trim() : '';

                    if (bandwidth > maxBandwidth && nextLine) {
                        maxBandwidth = bandwidth;
                        bestVariantUrl = nextLine;
                    }
                }
            }

            if (bestVariantUrl) {
                return new URL(bestVariantUrl, masterUrl).href;
            }
        } catch (e) {
            console.warn("Failed to parse master m3u8 playlist, falling back to original source:", e);
        }
        return masterUrl;
    }

    // Animated Artwork Controller (Static -> Master M3U8 resolution parse -> MP4)
    async function loadArtworkPipeline(staticImgUrl, m3u8Url = null, mp4Url = null) {
        const artworkImg = document.getElementById('artwork-img');
        const videoEl = document.getElementById('artwork-video');

        artworkImg.src = staticImgUrl || "";

        if (!videoEl) return;

        videoEl.pause();
        videoEl.style.display = 'none';

        if (!m3u8Url && !mp4Url) {
            videoEl.removeAttribute('src');
            return;
        }

        const tryVideoSource = (src) => {
            return new Promise((resolve) => {
                videoEl.src = src;
                videoEl.oncanplay = () => resolve(true);
                videoEl.onerror = () => resolve(false);
                videoEl.load();
            });
        };

        const supportsNativeHLS = videoEl.canPlayType('application/vnd.apple.mpegurl') !== '';
        let isVideoReady = false;

        if (m3u8Url) {
            m3u8Url = await resolveBestM3u8Variant(m3u8Url);
        }

        if (m3u8Url && supportsNativeHLS) {
            isVideoReady = await tryVideoSource(m3u8Url);
        }

        if (!isVideoReady && mp4Url) {
            isVideoReady = await tryVideoSource(mp4Url);
        }

        if (isVideoReady) {
            videoEl.style.display = 'block';
            videoEl.play().catch(() => {
                videoEl.style.display = 'none';
            });
        }
    }

    async function performSearch() {
        showError(null);

        const title = document.getElementById('song-input').value.trim();
        const artistName = document.getElementById('artist-input').value.trim();
        const storefront = document.getElementById('storefront-select').value;

        if (!title && !artistName) {
            document.getElementById('result-card').style.display = 'none';
            return;
        }

        const info = await catalogService.getCatalogInfo({ title, artistName }, storefront, currentMode);

        if (!info) {
            return showError("No catalog matches found.");
        }

        currentCatalogId = info.appleID;

        // Render Title + Explicit Badge
        const titleContainer = document.getElementById('res-song-title');
        titleContainer.innerText = info.title;
        
        let explicitIcon = document.getElementById('explicit-badge');
        if (info.isExplicit) {
            if (!explicitIcon) {
                explicitIcon = document.createElement('img');
                explicitIcon.id = 'explicit-badge';
                explicitIcon.src = 'ics/e.svg';
                explicitIcon.style.cssText = 'width: 16px; height: 16px; margin-left: 6px; vertical-align: middle;';
            }
            titleContainer.appendChild(explicitIcon);
        } else if (explicitIcon) {
            explicitIcon.remove();
        }

        // Render Artist Name • Collection Name
        if (info.collectionName && info.collectionName !== info.title) {
            document.getElementById('res-artist-name').innerText = `${info.artistName} • ${info.collectionName}`;
        } else {
            document.getElementById('res-artist-name').innerText = info.artistName;
        }

        document.getElementById('res-id-text').innerText = `ID: ${info.appleID}`;
        
        // Execute artwork display pipeline
        loadArtworkPipeline(info.albumCoverLink, info.motionM3u8, info.motionMp4);

        document.getElementById('result-card').style.display = 'flex';
    }

    function copySongId(pillElement) {
        if (!currentCatalogId) return;

        navigator.clipboard.writeText(currentCatalogId).then(() => {
            const iconImg = document.getElementById('copy-icon');
            if (iconImg) {
                iconImg.src = "ics/dodf.svg";
                setTimeout(() => {
                    iconImg.src = "ics/dod.svg";
                }, 1800);
            }
        });
    }
</script>
